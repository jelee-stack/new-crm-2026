<script>
    (async function initProspectsFromGAS() {
        const GAS_WEBAPP_URL = 'https://script.google.com/a/macros/snulaw.co.kr/s/AKfycbwDma6PDbd4vtCry2FOlp8IO-VNDUDzN-sWNMzaDV91Nhz6TI9Fg6h6GK1ty0vJNJ7K/exec';
        
        const state = {
            allRecords: [],
            filteredRecords: [],
            selectedIndex: 0,
            selectedYear: 'all',
            selectedMonth: 'all',
            crmOnly: false,
            focusOnly: false,
            currentPage: 1, 
            itemsPerPage: 30 
        };

        function formatPhone(raw) {
            const digits = String(raw || '').replace(/\D/g, '');
            if (!digits) return '';
            let v = digits;
            if ((v.length === 9 || v.length === 10) && v.startsWith('10')) v = `0${v}`;
            if (v.length === 11 && v.startsWith('010')) return `010-${v.slice(3, 7)}-${v.slice(7)}`;
            return v;
        }

        // 1899/1900년 오류 완전 박멸 + 원본 텍스트 100% 보존 로직
        function processDateText(raw) {
            const s = String(raw || '').trim();
            if (!s || s === '-') return { cleanText: '-', year: null, month: null };

            let clean = s; 
            let y = 2026; 
            let m = null;

            // 구글 시트가 1899.12.30 이나 1899-12-30 형식으로 보내는 찌꺼기 데이터 정제
            const badYearMatch = s.match(/^(1899|1900|1890)[\.\-](\d{1,2})[\.\-](\d{1,2})/);
            if (badYearMatch) {
                m = parseInt(badYearMatch[2], 10);
                clean = `${m}월 ${parseInt(badYearMatch[3], 10)}일`;
            } else {
                // 정상 데이터(03/07/토 등)는 clean 변수(원본)를 절대 훼손하지 않고 필터용 숫자만 추출
                const mMatch1 = s.match(/(\d{1,2})[\/\.월]/);
                if (mMatch1 && !s.match(/^\d{4}/)) { 
                    m = parseInt(mMatch1[1], 10);
                } else {
                    const mMatch2 = s.match(/^\d{4}[\.\-년\s]+(\d{1,2})/); 
                    if (mMatch2) m = parseInt(mMatch2[1], 10);
                }
            }
            return { cleanText: clean, year: y, month: m };
        }

        function normalizeRecord(rec, idx) {
            const dateInfo = processDateText(rec.dbEntryDate || rec['DB유입날짜'] || rec.lastConsultLabel || '');
            const phone = formatPhone(rec.phone || rec.연락처 || '');
            const name = String(rec.name || rec.이름 || '').trim();
            return {
                id: idx,
                name: name || phone || '-',
                phone: phone,
                contractStatus: rec.contractStatus || rec.계약여부 || '대기',
                showCrmBadge: Boolean(rec.isNew || rec['신규등록'] || rec['CRM등록']),
                firstCounselor: rec.firstCounselor || rec['1차상담자'] || '-',
                dbEntryDateRaw: dateInfo.cleanText,
                yearToken: dateInfo.year,
                monthToken: dateInfo.month,
                suspect: rec.suspect || rec.혐의 || '',
                path: rec.path || rec['경로'] || '' // 누락되었던 경로 데이터 복구
            };
        }

        function renderDetail(record) {
            if (!record) return;
            document.getElementById('detail-title').textContent = `${record.name} 고객 상세`;
            document.getElementById('detail-phone').textContent = record.phone || '-';
            document.getElementById('detail-date').textContent = record.dbEntryDateRaw; 
            document.getElementById('detail-counselor1').textContent = record.firstCounselor;
            document.getElementById('history-container').innerHTML = ''; 
        }

        function renderPagination(totalItems) {
            const totalPages = Math.max(1, Math.ceil(totalItems / state.itemsPerPage));
            const container = document.getElementById('pagination-container');
            const info = document.getElementById('pagination-info');
            container.innerHTML = '';
            info.textContent = `Page ${state.currentPage} of ${totalPages} (${totalItems}명)`;

            const createBtn = (text, disabled, isCurrent, onClick) => {
                const btn = document.createElement('button');
                btn.innerHTML = text;
                btn.disabled = disabled;
                if (isCurrent) {
                    btn.className = 'w-8 h-8 rounded-lg bg-primary-container text-white text-xs font-bold font-body mx-0.5';
                } else {
                    btn.className = disabled 
                        ? 'p-1.5 text-outline opacity-30 cursor-not-allowed mx-0.5' 
                        : 'w-8 h-8 rounded-lg hover:bg-surface-container text-on-surface-variant text-xs font-bold font-body transition-colors mx-0.5';
                }
                if (!disabled && onClick) btn.addEventListener('click', onClick);
                return btn;
            };

            container.appendChild(createBtn('<span class="material-symbols-outlined text-sm">chevron_left</span>', state.currentPage === 1, false, () => {
                state.currentPage--; renderList();
            }));

            let startPage = Math.max(1, state.currentPage - 2);
            let endPage = Math.min(totalPages, startPage + 4);
            if (endPage - startPage < 4) startPage = Math.max(1, endPage - 4);

            for (let i = startPage; i <= endPage; i++) {
                container.appendChild(createBtn(i, false, i === state.currentPage, () => {
                    state.currentPage = i; renderList();
                }));
            }

            container.appendChild(createBtn('<span class="material-symbols-outlined text-sm">chevron_right</span>', state.currentPage === totalPages, false, () => {
                state.currentPage++; renderList();
            }));
        }

        function renderList() {
            const container = document.getElementById('prospect-list-container');
            document.getElementById('badge-total-count').textContent = `전체 ${state.filteredRecords.length}명`;
            container.innerHTML = '';

            const startIndex = (state.currentPage - 1) * state.itemsPerPage;
            const endIndex = startIndex + state.itemsPerPage;
            const pageRecords = state.filteredRecords.slice(startIndex, endIndex);

            pageRecords.forEach((record, idxInPage) => {
                const globalIdx = startIndex + idxInPage; 
                const isActive = globalIdx === state.selectedIndex;
                const item = document.createElement('div');
                
                item.className = isActive
                    ? 'p-4 bg-surface-container-highest cursor-pointer border-2 border-primary-container rounded-2xl shadow-md transition-all mb-3'
                    : 'p-4 hover:bg-surface-container-low cursor-pointer border-b-2 border-outline-variant/10 rounded-2xl transition-all mb-3';
                item.dataset.index = String(globalIdx);

                const crmBadgeHtml = record.showCrmBadge ? '<span class="text-[10px] px-1.5 py-0.5 bg-[#4e56ab] text-white rounded font-bold mr-1">CRM등록</span>' : '';

                // 누락되었던 경로(path) 텍스트를 하단에 복구
                item.innerHTML = `
                    <div class="flex justify-between items-center mb-1">
                        <span class="font-bold text-lg font-headline">${record.name}</span>
                        <div>${crmBadgeHtml}<span class="text-[11px] px-2 py-0.5 bg-surface-container-high rounded uppercase font-bold">${record.contractStatus}</span></div>
                    </div>
                    <div class="flex justify-between items-center text-sm">
                        <span class="text-on-surface-variant font-body">${record.phone}</span>
                        <span class="text-xs font-bold font-body">${record.suspect}</span>
                    </div>
                    <div class="text-[10px] text-outline mt-2 font-medium flex justify-between items-center">
                        <span>최근상담: ${record.dbEntryDateRaw}</span>
                        <span>${record.path}</span>
                    </div>
                `;
                container.appendChild(item);
            });

            renderPagination(state.filteredRecords.length);
        }

        function applyFilters() {
            const focusTarget = ['보류', '대기', '부재중', '명도보류', '가선보류', '타변'];
            
            state.filteredRecords = state.allRecords.filter((r) => {
                const yOk = state.selectedYear === 'all' ? true : r.yearToken === parseInt(state.selectedYear, 10);
                const mOk = state.selectedMonth === 'all' ? true : r.monthToken === parseInt(state.selectedMonth, 10);
                const crmOk = state.crmOnly ? r.showCrmBadge === true : true;
                const focusOk = state.focusOnly ? focusTarget.includes(r.contractStatus) : true;
                return yOk && mOk && crmOk && focusOk;
            });
            
            state.currentPage = 1; 
            state.selectedIndex = 0; 

            document.getElementById('filter-crm-btn').className = state.crmOnly 
                ? 'px-4 py-1.5 bg-primary-container text-white text-sm font-bold rounded-full transition-all' 
                : 'px-4 py-1.5 bg-surface-container-highest text-[#353e91] text-sm font-bold rounded-full transition-all';
            document.getElementById('filter-focus-btn').className = state.focusOnly 
                ? 'px-4 py-1.5 bg-primary-container text-white text-sm font-bold rounded-full transition-all' 
                : 'px-4 py-1.5 bg-surface-container-highest text-[#353e91] text-sm font-bold rounded-full transition-all';
        }

        function bindEvents() {
            document.getElementById('filter-year-select').addEventListener('change', (e) => { state.selectedYear = e.target.value; applyFilters(); renderList(); renderDetail(state.filteredRecords[0]); });
            document.getElementById('filter-month-select').addEventListener('change', (e) => { state.selectedMonth = e.target.value; applyFilters(); renderList(); renderDetail(state.filteredRecords[0]); });
            document.getElementById('filter-crm-btn').addEventListener('click', () => { state.crmOnly = !state.crmOnly; applyFilters(); renderList(); renderDetail(state.filteredRecords[0]); });
            document.getElementById('filter-focus-btn').addEventListener('click', () => { state.focusOnly = !state.focusOnly; applyFilters(); renderList(); renderDetail(state.filteredRecords[0]); });
            
            document.getElementById('nav-all-prospects').addEventListener('click', () => {
                state.crmOnly = false; state.focusOnly = false; state.selectedYear = 'all'; state.selectedMonth = 'all';
                document.getElementById('filter-year-select').value = 'all';
                document.getElementById('filter-month-select').value = 'all';
                applyFilters(); renderList(); renderDetail(state.filteredRecords[0]);
            });

            document.getElementById('prospect-list-container').addEventListener('click', (e) => {
                const card = e.target.closest('[data-index]');
                if (!card) return;
                state.selectedIndex = Number(card.dataset.index);
                renderList(); 
                renderDetail(state.filteredRecords[state.selectedIndex]);
            });

            document.getElementById('new-customer-form').addEventListener('submit', (e) => {
                e.preventDefault();
                const newRec = normalizeRecord({ name: document.getElementById('new-name').value, phone: document.getElementById('new-phone').value, isNew: true, 'DB유입날짜': '웹등록' }, state.allRecords.length);
                state.allRecords.unshift(newRec);
                document.getElementById('new-customer-modal').classList.add('hidden');
                document.getElementById('nav-all-prospects').click();
            });
            
            const today = new Date().toISOString().split('T')[0];
            const dateInput = document.getElementById('today-date');
            if(dateInput) dateInput.value = today;
        }

        try {
            const url = `${GAS_WEBAPP_URL}?action=prospects&today=2026-03-24`;
            const res = await fetch(url, { method: 'GET' });
            const payload = await res.json();
            
            state.allRecords = (payload.records || []).map(normalizeRecord);
            applyFilters(); renderList(); renderDetail(state.filteredRecords[0]); bindEvents();
        } catch (err) { 
            console.error(err); 
        } finally {
            const loadingOverlay = document.getElementById('loading-overlay');
            loadingOverlay.classList.add('opacity-0', 'pointer-events-none');
            setTimeout(() => loadingOverlay.classList.add('hidden'), 300);
        }
    })();
</script>
</body></html>

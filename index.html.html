<!DOCTYPE html>
<html class="light" lang="ko"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>법무법인 에스 CRM - 가망 고객 관리</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" rel="stylesheet"/>
<style>
    @import url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2001@1.1/GmarketSansMedium.woff');
    @import url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2001@1.1/GmarketSansBold.woff');
    @font-face { font-family: 'Gmarket_Sans'; src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2001@1.1/GmarketSansMedium.woff') format('woff'); font-weight: normal; font-style: normal; }
    @font-face { font-family: 'Gmarket_Sans'; src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2001@1.1/GmarketSansBold.woff') format('woff'); font-weight: bold; font-style: normal; }
    body { font-family: 'Pretendard', sans-serif; }
    .font-gmarket { font-family: 'Gmarket_Sans', sans-serif; }
    .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #d2d9f4; border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: #b9c7df; }
    .fade-out { opacity: 0; pointer-events: none; transition: opacity 0.3s ease; }
</style>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              colors: {
                "outline": "#767683", "error": "#ba1a1a", "on-background": "#131b2e", "on-error-container": "#93000a",
                "surface-container-low": "#f2f3ff", "on-surface-variant": "#464651", "surface-container-high": "#e2e7ff",
                "on-primary-container": "#747cd3", "surface-container": "#eaedff", "on-primary": "#ffffff",
                "outline-variant": "#c6c5d3", "on-primary-fixed-variant": "#353e91", "surface": "#faf8ff",
                "surface-container-highest": "#dae2fd", "on-surface": "#131b2e", "primary-container": "#010766"
              },
              fontFamily: { "headline": ["Gmarket_Sans"], "body": ["Pretendard"] }
            }
          }
        }
    </script>
</head>
<body class="bg-surface text-on-surface overflow-hidden">

<aside id="mobile-sidebar" class="fixed left-0 top-0 h-full flex flex-col py-8 px-4 w-64 border-r border-outline-variant/10 bg-[#faf8ff] z-[60] transform -translate-x-full lg:translate-x-0 transition-transform duration-300 shadow-2xl lg:shadow-none">
<div class="flex items-center gap-3 mb-10 px-2">
<div class="w-10 h-10 bg-primary-container flex items-center justify-center rounded-lg">
<span class="material-symbols-outlined text-white" style="font-variation-settings: 'FILL' 1;">shield</span>
</div>
<div>
<h1 class="text-xl font-black text-[#000666] tracking-tighter font-headline">법무법인 에스</h1>
</div>
</div>
<nav class="flex-1 space-y-2 overflow-y-auto">
<a class="flex items-center gap-3 px-4 py-3 text-[#353e91] opacity-70 hover:opacity-100 font-headline font-bold text-lg transition-all" href="#">
<span class="material-symbols-outlined">dashboard</span> 대시보드
        </a>
<a id="nav-all-prospects" class="flex items-center gap-3 px-4 py-3 text-[#000666] font-bold border-r-4 border-[#000666] bg-[#eaedff] font-headline text-lg cursor-pointer transition-transform translate-x-1" onclick="if(window.innerWidth < 1024) toggleSidebar()">
<span class="material-symbols-outlined">person_search</span> 가망 고객
        </a>
<a class="flex items-center gap-3 px-4 py-3 text-[#353e91] opacity-70 hover:opacity-100 font-headline font-bold text-lg transition-all" href="#">
<span class="material-symbols-outlined">gavel</span> 사건 관리
        </a>
</nav>
<div class="mt-auto pt-4 border-t border-outline-variant/20 space-y-4">
<button class="w-full flex items-center justify-center gap-2 px-4 py-3.5 bg-primary-container text-white font-headline font-bold text-md rounded-xl hover:scale-[1.02] active:scale-95 transition-all" onclick="document.getElementById('new-customer-form').reset(); document.getElementById('today-date').value = new Date().toISOString().split('T')[0]; document.getElementById('new-customer-modal').classList.remove('hidden'); if(window.innerWidth < 1024) toggleSidebar();">
<span class="material-symbols-outlined text-xl">person_add</span> + 신규 고객 등록
        </button>
</div>
</aside>
<div id="sidebar-overlay" class="fixed inset-0 bg-black/50 z-50 hidden lg:hidden backdrop-blur-sm transition-opacity" onclick="toggleSidebar()"></div>

<div class="ml-0 lg:ml-64 h-screen flex flex-col overflow-hidden transition-all duration-300">
<header class="shrink-0 flex flex-col lg:flex-row justify-between items-start lg:items-center p-4 lg:px-8 lg:h-16 z-40 bg-[#ffffff]/80 backdrop-blur-md shadow-sm gap-3 lg:gap-6 overflow-x-hidden">
<div class="flex flex-col sm:flex-row items-start sm:items-center gap-3 lg:gap-4 w-full lg:w-auto flex-1">
    <div class="flex items-center gap-3 w-full lg:w-auto lg:max-w-sm flex-1">
        <button class="lg:hidden material-symbols-outlined p-1.5 rounded-md hover:bg-surface-container-highest text-primary-container bg-surface transition-colors" onclick="toggleSidebar()">menu</button>
        <div class="relative w-full flex-1">
            <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline scale-90">search</span>
            <input id="search-input" class="w-full pl-10 pr-4 py-2 bg-surface-container-low border-none rounded-full text-sm font-body focus:ring-1 focus:ring-primary-container" placeholder="고객명, 연락처 검색..." type="text"/>
        </div>
    </div>
    <div class="flex items-center gap-2 text-sm font-bold font-body text-[#353e91] shrink-0 w-full sm:w-auto px-1 sm:px-0">
        <select id="filter-year-select" class="bg-transparent border-none text-[#353e91] font-bold text-sm focus:ring-0 cursor-pointer pr-8 py-1">
            <option value="all">전체 연도</option>
            <option value="2026">2026년</option>
            <option value="2025">2025년</option>
        </select>
        <select id="filter-month-select" class="bg-transparent border-none text-[#353e91] font-bold text-sm focus:ring-0 cursor-pointer pr-8 py-1">
            <option value="all">전체 월</option>
            <option value="1">1월</option> <option value="2">2월</option> <option value="3">3월</option>
            <option value="4">4월</option> <option value="5">5월</option> <option value="6">6월</option>
            <option value="7">7월</option> <option value="8">8월</option> <option value="9">9월</option>
            <option value="10">10월</option> <option value="11">11월</option> <option value="12">12월</option>
        </select>
    </div>
</div>
<div class="flex items-center gap-2 lg:gap-3 shrink-0 w-full lg:w-auto overflow-x-auto pb-1 lg:pb-0 scrollbar-hide">
<button id="filter-crm-btn" class="px-4 py-1.5 bg-surface-container-highest text-[#353e91] text-xs lg:text-sm font-bold rounded-full hover:bg-surface-variant transition-all font-headline whitespace-nowrap">CRM등록 모아보기</button>
<button id="filter-focus-btn" class="px-4 py-1.5 bg-surface-container-highest text-[#353e91] text-xs lg:text-sm font-bold rounded-full hover:bg-surface-variant transition-all font-headline whitespace-nowrap">집중관리</button>
</div>
</header>

<main class="flex-1 flex flex-col lg:flex-row overflow-y-auto lg:overflow-hidden relative bg-surface">
<div id="loading-overlay" class="absolute inset-0 z-50 hidden flex-col items-center justify-center bg-surface/90 backdrop-blur-sm transition-opacity duration-300" style="display: none;">
    <div class="w-12 h-12 border-4 border-surface-container-highest border-t-primary-container rounded-full animate-spin"></div>
    <p class="mt-4 text-base font-bold text-primary-container font-headline animate-pulse">구글 시트에서 최신 데이터를 불러오는 중입니다...</p>
</div>

<section class="w-full lg:w-[400px] h-[50vh] lg:h-full border-b lg:border-b-0 lg:border-r border-outline-variant/20 bg-surface flex flex-col shrink-0">
<div class="p-4 lg:p-6 pb-2 shrink-0 bg-white/80 lg:bg-transparent backdrop-blur-md z-10 sticky top-0 border-b border-outline-variant/10 lg:border-none">
<div class="flex justify-between items-center mb-2 lg:mb-4">
<h2 class="text-lg lg:text-xl font-bold font-headline text-primary-container">가망 고객 리스트</h2>
<div class="flex items-center gap-2">
    <span id="badge-total-count" class="text-[10px] lg:text-xs font-bold px-2 py-0.5 bg-surface-container-high rounded-full">전체 0명</span>
    <button id="btn-sort-toggle" class="flex items-center gap-0.5 text-[#353e91] hover:text-primary-container transition-colors ml-1 lg:ml-2">
        <span class="material-symbols-outlined text-base lg:text-lg">sort</span>
        <span id="sort-text" class="text-[10px] lg:text-[11px] font-bold font-body">최신순</span>
    </button>
</div>
</div>
</div>
<div id="prospect-list-container" class="flex-1 overflow-y-auto px-4 pb-2 min-h-0 pt-2 lg:pt-0">
</div>
<div class="p-3 lg:p-4 border-t border-outline-variant/10 bg-white shrink-0 flex flex-col items-center">
    <div id="pagination-container" class="flex items-center justify-center gap-1 flex-wrap"></div>
    <p id="pagination-info" class="text-[9px] lg:text-[10px] text-center text-outline-variant mt-1 lg:mt-2 font-medium">Page 1 of 1</p>
</div>
</section>

<section id="detail-section" class="flex-1 bg-surface flex flex-col min-h-[700px] lg:min-h-0 lg:h-full overflow-visible lg:overflow-hidden relative">
<div class="p-5 lg:p-8 pb-2 lg:pb-4 shrink-0">
<div class="flex flex-col sm:flex-row justify-between items-start sm:items-end mb-4 lg:mb-8 gap-4 relative z-10">
<div class="w-full sm:w-auto">
<h2 id="detail-title" class="text-lg lg:text-xl font-bold font-headline text-primary-container mb-2 lg:mb-1 truncate w-full">고객 상세</h2>
<span class="flex items-center gap-3 text-base lg:text-lg font-bold text-on-surface">
    <span id="detail-phone-text">-</span>
    <a id="detail-phone-link" class="w-8 h-8 flex items-center justify-center rounded-lg bg-surface-container-high hover:bg-surface-variant text-primary-container transition-all" href="#">
        <span class="material-symbols-outlined text-lg lg:text-xl">call</span>
    </a>
</span>
</div>
<div class="flex gap-2 w-full sm:w-auto z-20">
<button id="btn-delete-prospect" class="flex-1 sm:flex-none px-4 lg:px-5 py-2.5 rounded-lg bg-surface-container-high font-bold text-sm text-error hover:bg-error/10 transition-all font-headline shadow-sm cursor-pointer relative z-20">삭제</button>
<button id="btn-edit-prospect" class="flex-1 sm:flex-none px-4 lg:px-5 py-2.5 rounded-lg bg-surface-container-high font-bold text-sm text-primary-container hover:bg-primary-container hover:text-white transition-all font-headline shadow-sm cursor-pointer relative z-20">수정하기</button>
<button id="btn-take-case" class="flex-1 sm:flex-none px-4 lg:px-5 py-2.5 rounded-lg bg-primary-container text-white font-bold text-sm shadow-lg shadow-primary-container/20 font-headline hover:scale-[1.02] active:scale-95 transition-all cursor-pointer relative z-20">사건 수임</button>
</div>
</div>

<div class="overflow-x-auto rounded-xl border border-outline-variant/10 shadow-sm w-full bg-white">
<table class="w-full text-left border-collapse font-body min-w-[500px]">
<thead class="bg-surface-container-low">
<tr>
<th class="px-4 lg:px-6 py-2.5 lg:py-3 text-[12px] lg:text-[14px] font-black text-on-surface whitespace-nowrap">DB 유입 날짜</th>
<th class="px-4 lg:px-6 py-2.5 lg:py-3 text-[12px] lg:text-[14px] font-black text-on-surface whitespace-nowrap">1차 상담자</th>
<th class="px-4 lg:px-6 py-2.5 lg:py-3 text-[12px] lg:text-[14px] font-black text-on-surface whitespace-nowrap">2차 상담자</th>
<th class="px-4 lg:px-6 py-2.5 lg:py-3 text-[12px] lg:text-[14px] font-black text-on-surface whitespace-nowrap">안내 금액</th>
</tr>
</thead>
<tbody class="bg-white">
<tr class="border-b border-outline-variant/5">
<td id="detail-date" class="px-4 lg:px-6 py-3 lg:py-4 font-semibold text-sm lg:text-base text-on-surface whitespace-nowrap">-</td>
<td id="detail-counselor1" class="px-4 lg:px-6 py-3 lg:py-4 text-sm lg:text-base text-on-surface-variant whitespace-nowrap">-</td>
<td id="detail-counselor2" class="px-4 lg:px-6 py-3 lg:py-4 text-sm lg:text-base text-on-surface-variant whitespace-nowrap">-</td>
<td id="detail-price" class="px-4 lg:px-6 py-3 lg:py-4 font-black text-sm lg:text-base text-primary-container whitespace-nowrap">-</td>
</tr>
</tbody>
</table>
</div>
</div>
<div class="flex-1 overflow-y-visible lg:overflow-y-auto px-5 lg:px-8 py-4 bg-surface-container-low/30 relative">
<h3 class="text-xs lg:text-sm font-bold text-outline-variant uppercase tracking-widest mb-4 lg:mb-6 sticky top-0 bg-surface-container-low/80 backdrop-blur px-2 py-1 rounded w-max z-10">상담 히스토리</h3>
<div id="history-container" class="relative pl-6 lg:pl-8 space-y-5 lg:space-y-6 before:content-[''] before:absolute before:left-2 lg:before:left-3 before:top-2 before:bottom-2 before:w-[2px] before:bg-outline-variant/20 pb-4">
</div>
</div>

<div class="p-4 lg:p-8 bg-white border-t border-outline-variant/10 shrink-0 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)] lg:shadow-none z-20 mt-auto">
    <div class="flex flex-col gap-3 lg:gap-4">
        <textarea id="note-content" class="w-full p-3 lg:p-4 bg-surface-container-low border-none rounded-xl text-sm font-body focus:ring-1 focus:ring-primary-container min-h-[80px] lg:min-h-[100px] resize-none" placeholder="새로운 상담 내용을 입력하세요..."></textarea>
        <div class="flex flex-col sm:flex-row items-stretch sm:items-center gap-3 lg:gap-6">
            <div class="flex gap-3 w-full sm:flex-1">
                <div class="flex-1">
                    <label class="block text-[9px] lg:text-[10px] font-bold text-outline-variant uppercase tracking-widest mb-1 ml-1 font-body">연락 예정일</label>
                    <div class="relative">
                        <input id="note-date" class="w-full px-3 lg:px-4 py-2 lg:py-2.5 bg-surface-container-low border-none rounded-lg text-xs lg:text-sm font-body focus:ring-1 focus:ring-primary-container" type="date"/>
                        <span class="material-symbols-outlined absolute right-2 lg:right-3 top-1/2 -translate-y-1/2 text-primary-container pointer-events-none text-base lg:text-lg">calendar_month</span>
                    </div>
                </div>
                <div class="flex-1">
                    <label class="block text-[9px] lg:text-[10px] font-bold text-outline-variant uppercase tracking-widest mb-1 ml-1 font-body">상태 변경</label>
                    <select id="bottom-status-select" class="w-full px-3 lg:px-4 py-2 lg:py-2.5 bg-surface-container-low border-none rounded-lg text-xs lg:text-sm font-bold text-primary-container focus:ring-1 focus:ring-primary-container appearance-none font-body pr-8">
                        <option value="">상태 없음</option>
                        <option value="계약완료">계약완료</option><option value="보류">보류</option><option value="불발">불발</option><option value="대기">대기</option><option value="단순">단순</option><option value="노담">노담</option><option value="노쇼">노쇼</option><option value="중복">중복</option><option value="전달">전달</option><option value="부재중">부재중</option><option value="제외">제외</option><option value="명도보류">명도보류</option><option value="가선보류">가선보류</option><option value="타변">타변</option>
                    </select>
                </div>
            </div>
            <div class="w-full sm:w-auto mt-1 sm:mt-0 flex items-end">
                <button id="btn-add-note" class="w-full sm:w-auto px-8 py-2.5 lg:py-3 bg-primary-container text-white font-black rounded-lg shadow-md hover:translate-y-[-1px] transition-all active:scale-95 font-headline text-sm lg:text-base cursor-pointer">노트 등록</button>
            </div>
        </div>
    </div>
</div>
</section>
</main>
</div>

<div class="fixed inset-0 z-[100] hidden bg-black/50 backdrop-blur-sm flex items-center justify-center p-4 lg:p-0" id="delete-customer-modal">
<div class="bg-white rounded-2xl w-full max-w-sm overflow-y-auto shadow-2xl p-6 lg:p-8 flex flex-col items-center">
    <div class="w-16 h-16 rounded-full bg-error/10 flex items-center justify-center mb-6">
        <span class="material-symbols-outlined text-error text-3xl" style="font-variation-settings:'FILL' 1">delete_forever</span>
    </div>
    <h3 id="delete-modal-title" class="text-lg lg:text-xl font-headline font-bold text-primary-container mb-2 text-center">고객 삭제</h3>
    <p class="text-sm lg:text-base text-on-surface-variant mb-10 text-center font-body">이 고객 데이터를 <strong class="text-error font-bold">영구히 삭제</strong> 하시겠습니까?</p>
    
    <div class="w-full grid grid-cols-2 gap-3 mt-auto">
        <button class="py-2.5 px-6 bg-surface-container-high text-primary-container font-headline font-bold rounded-xl hover:bg-surface-variant transition-all text-sm cursor-pointer" onclick="document.getElementById('delete-customer-modal').classList.add('hidden')" type="button">취소</button>
        <button id="btn-delete-confirm" class="py-2.5 px-6 bg-error text-white font-headline font-bold rounded-xl shadow-lg shadow-error/20 hover:scale-[1.01] active:scale-95 transition-all text-sm cursor-pointer" type="button">삭제하기</button>
    </div>
</div>
</div>

<div class="fixed inset-0 z-[100] hidden bg-black/50 backdrop-blur-sm flex items-center justify-center p-4 lg:p-0" id="new-customer-modal">
<div class="bg-white rounded-2xl w-full max-w-lg max-h-[90vh] overflow-y-auto shadow-2xl">
<div class="p-5 lg:p-6 border-b border-outline-variant/10 flex justify-between items-center bg-surface-container-low sticky top-0 z-10">
<h3 class="text-lg lg:text-xl font-headline font-bold text-primary-container">신규 고객 등록</h3>
<button class="material-symbols-outlined text-outline hover:text-error transition-colors" onclick="document.getElementById('new-customer-modal').classList.add('hidden')">close</button>
</div>
<form id="new-customer-form" class="p-5 lg:p-8 space-y-4 lg:space-y-5">
<div class="space-y-1">
<label class="text-[12px] lg:text-[14px] font-black text-on-surface uppercase tracking-wider ml-1 font-body">DB 유입 날짜</label>
<input id="today-date" class="w-full px-4 py-2 lg:py-2.5 bg-surface-container-low border-none rounded-xl text-sm font-body focus:ring-2 focus:ring-primary-container/20" type="date"/>
</div>
<div class="space-y-1">
<label class="text-[12px] lg:text-[14px] font-black text-on-surface uppercase tracking-wider ml-1 font-body">이름</label>
<input id="new-name" class="w-full px-4 py-2 lg:py-2.5 bg-surface-container-low border-none rounded-xl text-sm font-body focus:ring-2 focus:ring-primary-container/20" placeholder="고객명 입력" type="text"/>
</div>
<div class="space-y-1">
<label class="text-[12px] lg:text-[14px] font-black text-on-surface uppercase tracking-wider ml-1 font-body">전화번호</label>
<input id="new-phone" class="w-full px-4 py-2 lg:py-2.5 bg-surface-container-low border-none rounded-xl text-sm font-body focus:ring-2 focus:ring-primary-container/20" placeholder="010-0000-0000" type="tel" required/>
</div>
<div class="space-y-1">
<label class="text-[12px] lg:text-[14px] font-black text-on-surface uppercase tracking-wider ml-1 font-body">경로</label>
<input id="new-path" class="w-full px-4 py-2 lg:py-2.5 bg-surface-container-low border-none rounded-xl text-sm font-body focus:ring-2 focus:ring-primary-container/20" placeholder="예: 블로그, 유튜브" type="text"/>
</div>
<div class="space-y-1">
<label class="text-[12px] lg:text-[14px] font-black text-on-surface uppercase tracking-wider ml-1 font-body">혐의</label>
<input id="new-suspect" class="w-full px-4 py-2 lg:py-2.5 bg-surface-container-low border-none rounded-xl text-sm font-body focus:ring-2 focus:ring-primary-container/20" placeholder="예: 명도소송, 음주운전" type="text"/>
</div>
<div class="space-y-1">
<label class="text-[12px] lg:text-[14px] font-black text-on-surface uppercase tracking-wider ml-1 font-body">1차 상담자</label>
<select id="new-counselor" class="w-full px-4 py-2 lg:py-2.5 bg-surface-container-low border-none rounded-xl text-sm font-body focus:ring-2 focus:ring-primary-container/20 appearance-none pr-8">
<option>원진혁</option><option>홍준기</option><option>이지은</option><option>직접입력</option>
</select>

<script>
    window.toggleSidebar = function() {
        const sidebar = document.getElementById('mobile-sidebar');
        const overlay = document.getElementById('sidebar-overlay');
        sidebar.classList.toggle('-translate-x-full');
        overlay.classList.toggle('hidden');
    };

    (async function initProspectsFromGAS() {
        const GAS_WEBAPP_URL = 'https://script.google.com/macros/s/AKfycbwA5YPdKRnswKkpe32pHDQT4dd-QH8v61a8RXz8uT0GMN92ji1tASvujPeCWsG-hOIs/exec';
        
        // 지은 님 원본 코드의 캐시 키를 완벽히 유지합니다.
        const CACHE_KEY = 'crm_local_data_v5';
        
        // 커스텀(신규등록) 데이터를 저장할 전용 금고만 추가합니다.
        const CRM_CUSTOM_KEY = 'crm_custom_records_v1';
        let customRecords = JSON.parse(localStorage.getItem(CRM_CUSTOM_KEY)) || [];

        function saveCustomRecords() {
            localStorage.setItem(CRM_CUSTOM_KEY, JSON.stringify(customRecords));
        }
        
        let isEventsBound = false;

        const today = new Date();
        const currentYear = String(today.getFullYear());
        const currentMonth = String(today.getMonth() + 1);

        const state = {
            allRecords: [],
            filteredRecords: [],
            selectedIndex: 0,
            selectedYear: currentYear,  
            selectedMonth: currentMonth, 
            crmOnly: false,
            focusOnly: false,
            searchQuery: '', 
            currentPage: 1, 
            itemsPerPage: 30,
            sortOrder: 'desc'
        };

        const yrEl = document.getElementById('filter-year-select');
        if(yrEl) {
            const optionExists = Array.from(yrEl.options).some(opt => opt.value === state.selectedYear);
            if(optionExists) yrEl.value = state.selectedYear;
            else state.selectedYear = 'all';
        }
        const moEl = document.getElementById('filter-month-select');
        if(moEl) {
            const optionExists = Array.from(moEl.options).some(opt => opt.value === state.selectedMonth);
            if(optionExists) moEl.value = state.selectedMonth;
            else state.selectedMonth = 'all';
        }

        function formatPhone(raw) {
            const digits = String(raw || '').replace(/\D/g, '');
            if (!digits) return '';
            let v = digits;
            if ((v.length === 9 || v.length === 10) && v.startsWith('10')) v = `0${v}`;
            if (v.length === 11 && v.startsWith('010')) return `010-${v.slice(3, 7)}-${v.slice(7)}`;
            return v;
        }

        function normalizeRecord(rec, idxOrId) {
            const rawDateStr = rec.dbEntryDateRaw ? String(rec.dbEntryDateRaw).trim() : '-';
            const phone = formatPhone(rec.phone || '');
            const name = String(rec.name || '').trim();
            
            let initialHistory = [];
            if (rec.consultationContent) {
                initialHistory.push({
                    date: rawDateStr !== '-' ? rawDateStr : '날짜 미상',
                    author: rec.firstCounselor || '시스템',
                    content: rec.consultationContent
                });
            }

            return {
                id: (typeof idxOrId === 'string') ? idxOrId : (rec.id || `r-${idxOrId}`),
                name: name || phone || '-',
                phone: phone,
                contractStatus: rec.contractStatus ? rec.contractStatus.trim() : '',
                showCrmBadge: Boolean(rec.isNew || rec['신규등록'] || rec['CRM등록']),
                firstCounselor: rec.firstCounselor || '-',
                secondCounselor: rec.secondCounselor || '-',
                firstGuideAmount: rec.firstGuideAmount || '-',
                dbEntryDateRaw: rawDateStr, 
                yearToken: rec.sheetYear || parseInt(currentYear, 10),
                monthToken: rec.sheetMonth || parseInt(currentMonth, 10),
                suspect: rec.suspect || '',
                path: rec.path || '',
                isNew: rec.isNew || false,
                isCustom: rec.isCustom || false, // 추가: 웹 신규등록 식별용
                consultationHistory: rec.consultationHistory || initialHistory 
            };
        }

        function renderDetail(record) {
            if (!record) return;
            document.getElementById('detail-title').textContent = `${record.name} 고객 상세`;
            
            document.getElementById('detail-phone-text').textContent = record.phone || '-';
            const telLink = document.getElementById('detail-phone-link');
            const digits = (record.phone || '').replace(/\D/g, '');
            telLink.href = digits ? `tel:${digits}` : '#';

            document.getElementById('detail-date').textContent = record.dbEntryDateRaw; 
            document.getElementById('detail-counselor1').textContent = record.firstCounselor;
            document.getElementById('detail-counselor2').textContent = record.secondCounselor;
            document.getElementById('detail-price').textContent = record.firstGuideAmount;
            
            const bottomStatusSelect = document.getElementById('bottom-status-select');
            if (bottomStatusSelect) bottomStatusSelect.value = record.contractStatus;
            
            const historyHost = document.getElementById('history-container');
            historyHost.innerHTML = ''; 
            const histories = record.consultationHistory || [];
            
            if (histories.length > 0) {
                const frag = document.createDocumentFragment();
                histories.forEach((h, idx) => {
                    const wrap = document.createElement('div');
                    wrap.className = 'relative';
                    wrap.innerHTML = `
                        <div class="absolute -left-6 lg:-left-7 top-1 w-3 h-3 lg:w-4 lg:h-4 rounded-full ${idx === 0 ? 'bg-primary-container' : 'bg-surface-container-highest'} border-[3px] lg:border-4 border-surface shadow-sm"></div>
                        <div class="bg-white p-4 lg:p-5 rounded-xl shadow-sm border border-outline-variant/5 ${idx > 0 ? 'opacity-80' : ''}">
                            <div class="flex justify-between items-center mb-2 lg:mb-3">
                                <span class="text-[10px] lg:text-xs font-bold text-on-primary-fixed-variant bg-surface-container px-2 py-1 rounded font-body">${h.date}</span>
                                <span class="text-[10px] lg:text-xs font-medium text-outline font-body">작성자: ${h.author}</span>
                            </div>
                            <p class="text-xs lg:text-sm text-on-surface leading-relaxed font-body whitespace-pre-wrap">${h.content}</p>
                        </div>
                    `;
                    frag.appendChild(wrap);
                });
                historyHost.appendChild(frag);
            } else {
                historyHost.innerHTML = '<p class="text-xs lg:text-sm text-outline-variant italic">기록된 상담 히스토리가 없습니다.</p>';
            }
        }

        function renderPagination(totalItems) {
            const totalPages = Math.max(1, Math.ceil(totalItems / state.itemsPerPage));
            const container = document.getElementById('pagination-container');
            const info = document.getElementById('pagination-info');
            container.innerHTML = '';
            info.textContent = `Page ${state.currentPage} of ${totalPages} (${totalItems}명)`;

            const createBtn = (text, disabled, isCurrent, onClick) => {
                const btn = document.createElement('button');
                btn.innerHTML = text;
                btn.disabled = disabled;
                if (isCurrent) {
                    btn.className = 'w-7 h-7 lg:w-8 lg:h-8 rounded-md lg:rounded-lg bg-primary-container text-white text-xs font-bold font-body mx-0.5';
                } else {
                    btn.className = disabled 
                        ? 'p-1 lg:p-1.5 text-outline opacity-30 cursor-not-allowed mx-0.5' 
                        : 'w-7 h-7 lg:w-8 lg:h-8 rounded-md lg:rounded-lg hover:bg-surface-container text-on-surface-variant text-xs font-bold font-body transition-colors mx-0.5';
                }
                if (!disabled && onClick) btn.addEventListener('click', onClick);
                return btn;
            };

            container.appendChild(createBtn('<span class="material-symbols-outlined text-[12px] lg:text-sm">chevron_left</span>', state.currentPage === 1, false, () => {
                state.currentPage--; renderList();
            }));

            let startPage = Math.max(1, state.currentPage - 2);
            let endPage = Math.min(totalPages, startPage + 4);
            if (endPage - startPage < 4) startPage = Math.max(1, endPage - 4);

            for (let i = startPage; i <= endPage; i++) {
                container.appendChild(createBtn(i, false, i === state.currentPage, () => {
                    state.currentPage = i; renderList();
                }));
            }

            container.appendChild(createBtn('<span class="material-symbols-outlined text-[12px] lg:text-sm">chevron_right</span>', state.currentPage === totalPages, false, () => {
                state.currentPage++; renderList();
            }));
        }

        function renderList() {
            const container = document.getElementById('prospect-list-container');
            document.getElementById('badge-total-count').textContent = `전체 ${state.filteredRecords.length}명`;
            container.innerHTML = '';

            const startIndex = (state.currentPage - 1) * state.itemsPerPage;
            const endIndex = startIndex + state.itemsPerPage;
            const pageRecords = state.filteredRecords.slice(startIndex, endIndex);

            pageRecords.forEach((record, idxInPage) => {
                const globalIdx = startIndex + idxInPage; 
                const isActive = globalIdx === state.selectedIndex;
                const item = document.createElement('div');
                
                item.className = isActive
                    ? 'p-3 lg:p-4 bg-[#eaedff] cursor-pointer border-l-[3px] lg:border-l-4 border-[#000666] rounded-lg lg:rounded-xl shadow-sm transition-all mb-2 lg:mb-3'
                    : 'p-3 lg:p-4 bg-white hover:bg-surface-container-low cursor-pointer border border-outline-variant/10 rounded-lg lg:rounded-xl transition-all mb-2 lg:mb-3';
                item.dataset.index = String(globalIdx);

                const crmBadgeHtml = record.showCrmBadge ? '<span class="text-[9px] lg:text-[10px] px-1 lg:px-1.5 py-0.5 bg-[#4e56ab] text-white rounded font-bold mr-1">CRM등록</span>' : '';
                const statusBadge = record.contractStatus ? `<span class="text-[10px] lg:text-[11px] px-1.5 lg:px-2 py-0.5 bg-surface-container-high rounded uppercase font-bold">${record.contractStatus}</span>` : '';

                item.innerHTML = `
                    <div class="flex justify-between items-center mb-1">
                        <span class="font-bold text-base lg:text-lg font-headline">${record.name}</span>
                        <div class="flex items-center">${crmBadgeHtml}${statusBadge}</div>
                    </div>
                    <div class="flex justify-between items-center text-xs lg:text-sm">
                        <span class="text-on-surface-variant font-body">${record.phone}</span>
                        <span class="text-[10px] lg:text-xs font-bold font-body">${record.suspect}</span>
                    </div>
                    <div class="text-[9px] lg:text-[10px] text-outline mt-1.5 lg:mt-2 font-medium flex justify-between items-center">
                        <span>최근상담: ${record.dbEntryDateRaw}</span>
                        <span>${record.path}</span>
                    </div>
                `;
                container.appendChild(item);
            });

            renderPagination(state.filteredRecords.length);
        }

        function updateToggleUI() {
            document.getElementById('filter-crm-btn').className = state.crmOnly 
                ? 'px-3 lg:px-4 py-1.5 bg-primary-container text-white text-xs lg:text-sm font-bold rounded-full transition-all font-headline whitespace-nowrap shadow-md' 
                : 'px-3 lg:px-4 py-1.5 bg-surface-container-highest text-[#353e91] text-xs lg:text-sm font-bold rounded-full hover:bg-surface-variant transition-all font-headline whitespace-nowrap';
            document.getElementById('filter-focus-btn').className = state.focusOnly 
                ? 'px-3 lg:px-4 py-1.5 bg-primary-container text-white text-xs lg:text-sm font-bold rounded-full transition-all font-headline whitespace-nowrap shadow-md' 
                : 'px-3 lg:px-4 py-1.5 bg-surface-container-highest text-[#353e91] text-xs lg:text-sm font-bold rounded-full hover:bg-surface-variant transition-all font-headline whitespace-nowrap';
        }

        function applyFilters() {
            const focusTarget = ['보류', '대기', '부재중', '명도보류', '가선보류', '타변'];
            
            state.filteredRecords = state.allRecords.filter((r) => {
                const yOk = state.selectedYear === 'all' ? true : r.yearToken === parseInt(state.selectedYear, 10);
                const mOk = state.selectedMonth === 'all' ? true : r.monthToken === parseInt(state.selectedMonth, 10);
                // 모아보기에 신규 등록 데이터 포함
                const crmOk = state.crmOnly ? (r.showCrmBadge === true || r.isCustom === true) : true;
                const focusOk = state.focusOnly ? focusTarget.includes(r.contractStatus) : true;
                
                let searchOk = true;
                if (state.searchQuery) {
                    const q = state.searchQuery.toLowerCase();
                    searchOk = r.name.toLowerCase().includes(q) || r.phone.includes(q);
                }

                return yOk && mOk && crmOk && focusOk && searchOk;
            });

            // 이미 내림차순(최신순)이므로 asc일 때만 뒤집습니다.
            if (state.sortOrder === 'asc') {
                state.filteredRecords.reverse(); 
            }
            
            updateToggleUI(); 
        }

        // 지은 님 원본 함수 구조 100% 복구 및 유지
        function updateUIWithData(payload) {
            // 구글 시트 데이터를 정규화하고 순서를 뒤집습니다. (수정완료: 역순 버그 픽스 - 가장 밑에 있는 최신 데이터가 맨 위로 옵니다!)
            let gasRecs = (payload.records || []).map((r, i) => normalizeRecord(r, `gas_${i}`));
            gasRecs.reverse(); 

            // 브라우저 금고에 저장된 CRM 신규 데이터를 구글 시트 데이터 위에 합칩니다.
            state.allRecords = [...customRecords, ...gasRecs];

            applyFilters(); renderList(); 
            
            if(state.filteredRecords.length > 0) {
                const currentRec = state.filteredRecords[state.selectedIndex];
                renderDetail(currentRec || state.filteredRecords[0]);
            } else {
                renderDetail(null);
            }
        }

        // 특정 데이터 1건을 업데이트하고 화면 다시 그리기
        function updateRecord(updatedRec) {
            const stateIdx = state.allRecords.findIndex(r => r.id === updatedRec.id);
            if (stateIdx > -1) state.allRecords[stateIdx] = updatedRec;

            // 웹에서 직접 만든 데이터면 브라우저 금고에도 저장
            if (updatedRec.isCustom) {
                const customIdx = customRecords.findIndex(r => r.id === updatedRec.id);
                if (customIdx > -1) {
                    customRecords[customIdx] = updatedRec;
                    saveCustomRecords();
                }
            }

            applyFilters(); renderList();
            renderDetail(state.filteredRecords[state.selectedIndex]);
        }

        function bindEvents() {
            document.getElementById('search-input').addEventListener('input', (e) => { 
                state.searchQuery = e.target.value; 
                state.currentPage = 1; state.selectedIndex = 0;
                applyFilters(); renderList(); 
                if (state.filteredRecords.length > 0) renderDetail(state.filteredRecords[0]); 
            });

            document.getElementById('filter-year-select').addEventListener('change', (e) => { state.selectedYear = e.target.value; state.currentPage = 1; state.selectedIndex = 0; applyFilters(); renderList(); renderDetail(state.filteredRecords[0]); });
            document.getElementById('filter-month-select').addEventListener('change', (e) => { state.selectedMonth = e.target.value; state.currentPage = 1; state.selectedIndex = 0; applyFilters(); renderList(); renderDetail(state.filteredRecords[0]); });
            
            document.getElementById('filter-crm-btn').addEventListener('click', () => { state.crmOnly = !state.crmOnly; state.currentPage = 1; state.selectedIndex = 0; applyFilters(); renderList(); renderDetail(state.filteredRecords[0]); });
            document.getElementById('filter-focus-btn').addEventListener('click', () => { state.focusOnly = !state.focusOnly; state.currentPage = 1; state.selectedIndex = 0; applyFilters(); renderList(); renderDetail(state.filteredRecords[0]); });
            
            document.getElementById('btn-sort-toggle').addEventListener('click', () => {
                state.sortOrder = state.sortOrder === 'desc' ? 'asc' : 'desc';
                document.getElementById('sort-text').textContent = state.sortOrder === 'desc' ? '최신순' : '오래된순';
                state.currentPage = 1; state.selectedIndex = 0;
                applyFilters(); renderList(); renderDetail(state.filteredRecords[0]);
            });

            document.getElementById('nav-all-prospects').addEventListener('click', () => {
                state.crmOnly = false; state.focusOnly = false; state.selectedYear = 'all'; state.selectedMonth = 'all'; state.searchQuery = '';
                document.getElementById('filter-year-select').value = 'all';
                document.getElementById('filter-month-select').value = 'all';
                document.getElementById('search-input').value = '';
                state.currentPage = 1; state.selectedIndex = 0;
                applyFilters(); renderList(); renderDetail(state.filteredRecords[0]);
                if(window.innerWidth < 1024) toggleSidebar();
            });

            document.getElementById('prospect-list-container').addEventListener('click', (e) => {
                const card = e.target.closest('[data-index]');
                if (!card) return;
                state.selectedIndex = Number(card.dataset.index);
                renderList(); 
                renderDetail(state.filteredRecords[state.selectedIndex]);
            });

            const bottomStatusSelect = document.getElementById('bottom-status-select');
            if (bottomStatusSelect) {
                bottomStatusSelect.addEventListener('change', (e) => {
                    const record = state.filteredRecords[state.selectedIndex];
                    if (!record) return;
                    record.contractStatus = e.target.value;
                    const originalRecord = state.allRecords.find(r => r.id === record.id);
                    if (originalRecord) originalRecord.contractStatus = e.target.value;
                    
                    updateRecord(record);
                });
            }

            document.getElementById('btn-add-note').addEventListener('click', () => {
                const record = state.filteredRecords[state.selectedIndex];
                if (!record) return;
                
                const noteContent = document.getElementById('note-content').value.trim();
                const noteDate = document.getElementById('note-date').value;
                const statusSelect = document.getElementById('bottom-status-select').value;
                
                if (noteContent) {
                    if (!record.consultationHistory) record.consultationHistory = [];
                    record.consultationHistory.unshift({
                        date: noteDate || new Date().toISOString().split('T')[0],
                        author: '상담자', 
                        content: noteContent
                    });
                }
                if (statusSelect) record.contractStatus = statusSelect;

                const originalRecord = state.allRecords.find(r => r.id === record.id);
                if (originalRecord) {
                    originalRecord.consultationHistory = record.consultationHistory;
                    originalRecord.contractStatus = record.contractStatus;
                }

                document.getElementById('note-content').value = ''; 
                updateRecord(record);
            });

            // 수정완료: 신규 고객 등록 후 전체 필터로 풀리는 현상 방지 & 즉시 저장!
            document.getElementById('new-customer-form').addEventListener('submit', (e) => {
                e.preventDefault();
                
                const dateStr = document.getElementById('today-date').value || new Date().toISOString().split('T')[0];
                const [y, m] = dateStr.split('-');
                
                const rawRec = {
                    id: `custom_${Date.now()}`,
                    name: document.getElementById('new-name').value,
                    phone: document.getElementById('new-phone').value,
                    isNew: true,
                    isCustom: true, // 로컬 전용 식별자
                    dbEntryDateRaw: dateStr.replace(/-/g, '.'),
                    path: document.getElementById('new-path').value,
                    suspect: document.getElementById('new-suspect').value,
                    firstCounselor: document.getElementById('new-counselor').value,
                    contractStatus: document.getElementById('new-status').value,
                    consultationContent: document.getElementById('new-memo').value,
                    sheetYear: parseInt(y, 10),
                    sheetMonth: parseInt(m, 10)
                };

                const newRec = normalizeRecord(rawRec, rawRec.id);
                
                // 브라우저 금고에 저장 (새로고침 방어)
                customRecords.unshift(newRec);
                saveCustomRecords();
                
                // 현재 데이터 맨 위에 꽂아넣기
                state.allRecords.unshift(newRec);
                
                document.getElementById('new-customer-modal').classList.add('hidden');
                
                // 기존 악성코드(전체보기 클릭) 삭제. 현재 필터를 유지하며 리스트 1번으로 선택.
                state.selectedIndex = 0;
                applyFilters(); 
                renderList();
                if (state.filteredRecords.length > 0) renderDetail(state.filteredRecords[0]);
            });

            document.getElementById('btn-take-case').addEventListener('click', () => {
                const record = state.filteredRecords[state.selectedIndex];
                if (!record) return;
                record.contractStatus = '계약완료';
                const originalRecord = state.allRecords.find(r => r.id === record.id);
                if (originalRecord) originalRecord.contractStatus = '계약완료';

                updateRecord(record);
            });

            document.getElementById('btn-edit-prospect').addEventListener('click', () => {
                const record = state.filteredRecords[state.selectedIndex];
                if (!record) return;
                
                document.getElementById('edit-date').value = record.dbEntryDateRaw;
                document.getElementById('edit-name').value = record.name !== '-' ? record.name : '';
                document.getElementById('edit-phone').value = record.phone;
                document.getElementById('edit-path').value = record.path;
                document.getElementById('edit-suspect').value = record.suspect;
                document.getElementById('edit-counselor1').value = record.firstCounselor !== '-' ? record.firstCounselor : '';
                document.getElementById('edit-counselor2').value = record.secondCounselor !== '-' ? record.secondCounselor : '';
                document.getElementById('edit-price').value = record.firstGuideAmount !== '-' ? record.firstGuideAmount : '';
                document.getElementById('edit-status').value = record.contractStatus;

                document.getElementById('edit-customer-modal').classList.remove('hidden');
            });

            document.getElementById('edit-customer-form').addEventListener('submit', (e) => {
                e.preventDefault();
                const record = state.filteredRecords[state.selectedIndex];
                if (!record) return;

                const originalRecord = state.allRecords.find(r => r.id === record.id);
                if (!originalRecord) return;

                originalRecord.dbEntryDateRaw = document.getElementById('edit-date').value;
                originalRecord.name = document.getElementById('edit-name').value || '-';
                originalRecord.phone = formatPhone(document.getElementById('edit-phone').value);
                originalRecord.path = document.getElementById('edit-path').value;
                originalRecord.suspect = document.getElementById('edit-suspect').value;
                originalRecord.firstCounselor = document.getElementById('edit-counselor1').value || '-';
                originalRecord.secondCounselor = document.getElementById('edit-counselor2').value || '-';
                originalRecord.firstGuideAmount = document.getElementById('edit-price').value || '-';
                originalRecord.contractStatus = document.getElementById('edit-status').value;

                record.dbEntryDateRaw = originalRecord.dbEntryDateRaw;
                record.name = originalRecord.name;
                record.phone = originalRecord.phone;
                record.path = originalRecord.path;
                record.suspect = originalRecord.suspect;
                record.firstCounselor = originalRecord.firstCounselor;
                record.secondCounselor = originalRecord.secondCounselor;
                record.firstGuideAmount = originalRecord.firstGuideAmount;
                record.contractStatus = originalRecord.contractStatus;

                document.getElementById('edit-customer-modal').classList.add('hidden');
                updateRecord(record);
            });

            // 수정완료: 삭제 기능 이벤트 (웹에서 만든 데이터만 팝업 허용)
            const deleteBtn = document.getElementById('btn-delete-prospect');
            const deleteModal = document.getElementById('delete-customer-modal');
            const deleteConfirmBtn = document.getElementById('btn-delete-confirm');

            if (deleteBtn) {
                deleteBtn.addEventListener('click', () => {
                    const record = state.filteredRecords[state.selectedIndex];
                    if (!record) return;
                    
                    if (!record.isCustom) {
                        alert('❌ 구글 시트 원본 보호 ❌\n\n구글 시트 연동 데이터는 웹에서 임의로 지울 수 없습니다. 시트에서 직접 삭제해주세요.');
                        return;
                    }
                    
                    document.getElementById('delete-modal-title').innerHTML = `<strong class="text-error font-black">${record.name}</strong> 고객 삭제`;
                    deleteModal.classList.remove('hidden');
                });
            }

            if (deleteConfirmBtn) {
                deleteConfirmBtn.addEventListener('click', () => {
                    const record = state.filteredRecords[state.selectedIndex];
                    if (!record || !record.isCustom) return;

                    // 1. 브라우저 금고에서 영구 삭제
                    customRecords = customRecords.filter(r => r.id !== record.id);
                    saveCustomRecords();
                    
                    // 2. 현재 화면 리스트에서 삭제
                    state.allRecords = state.allRecords.filter(r => r.id !== record.id);
                    
                    deleteModal.classList.add('hidden');
                    state.selectedIndex = 0;
                    applyFilters(); 
                    renderList();
                    if(state.filteredRecords.length > 0) {
                        renderDetail(state.filteredRecords[0]);
                    } else {
                        renderDetail(null);
                    }
                });
            }
        }

        // 지은 님 코드의 데이터 로딩 함수 100% 원본 보존 
        // (단 1줄, 딜레이 없애기 위한 hidden 처리만 추가)
        async function fetchFromGAS(isBackground = false) {
            try {
                if (!isBackground) {
                    const overlay = document.getElementById('loading-overlay');
                    overlay.style.display = 'flex';
                    overlay.classList.remove('hidden');
                }
                
                const url = `${GAS_WEBAPP_URL}?action=prospects`;
                const res = await fetch(url);
                if (!res.ok) throw new Error(`데이터 연동 에러 상태코드: ${res.status}`);
                
                const payload = await res.json();
                
                localStorage.setItem(CACHE_KEY, JSON.stringify(payload));
                
                updateUIWithData(payload);
                
                if (!isEventsBound) {
                    bindEvents();
                    isEventsBound = true;
                }
            } catch (err) {
                console.error('데이터 통신 에러:', err);
            } finally {
                const overlay = document.getElementById('loading-overlay');
                overlay.classList.add('fade-out');
                setTimeout(() => {
                    overlay.classList.add('hidden');
                    overlay.style.display = 'none';
                    overlay.classList.remove('fade-out');
                }, 300);
            }
        }

        // 지은 님 코드의 캐시 검사 로직 100% 원본 보존
        const cachedData = localStorage.getItem(CACHE_KEY);
        if (cachedData) {
            try {
                const payload = JSON.parse(cachedData);
                updateUIWithData(payload);
                
                const overlay = document.getElementById('loading-overlay');
                overlay.classList.add('hidden');
                overlay.style.display = 'none';
                
                bindEvents();
                isEventsBound = true;
                
                fetchFromGAS(true);
            } catch(e) {
                fetchFromGAS(false); 
            }
        } else {
            fetchFromGAS(false);
        }
    })();
</script>
</body></html>

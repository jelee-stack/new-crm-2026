<script>
    document.addEventListener('DOMContentLoaded', function() {
        const today = new Date().toISOString().split('T')[0];
        const dateInput = document.getElementById('today-date');
        if(dateInput) dateInput.value = today;
    });

    (async function initProspectsFromGAS() {
        const GAS_WEBAPP_URL = 'https://script.google.com/a/macros/snulaw.co.kr/s/AKfycbwDma6PDbd4vtCry2FOlp8IO-VNDUDzN-sWNMzaDV91Nhz6TI9Fg6h6GK1ty0vJNJ7K/exec';
        const TODAY_FOR_FILTER = '2026-03-24';

        const state = {
            allRecords: [],
            filteredRecords: [],
            selectedIndex: 0,
            selectedYear: 2026,
            selectedMonth: null,
            crmOnly: false,
            focusOnly: false
        };

        function normalizeText(v) {
            return (v ?? '').toString().replace(/\s+/g, '').trim();
        }

        // 텍스트에서 월 데이터만 영리하게 추출
        function extractMonthFromRaw(raw) {
            const s = String(raw || '').trim();
            if(!s || s === '-') return null;
            // '03/07' 같은 형태에서 3 추출
            const slashMatch = s.match(/^(\d+)\//);
            if(slashMatch) return parseInt(slashMatch[1], 10);
            
            // '3월' 같은 형태에서 3 추출
            const koMatch = s.match(/(\d+)월/);
            if(koMatch) return parseInt(koMatch[1], 10);
            return null;
        }

        function formatPhone(raw) {
            const digits = String(raw ?? '').replace(/\D/g, '');
            if (!digits) return '';
            let v = digits;
            if ((v.length === 9 || v.length === 10) && v.startsWith('10')) v = `0${v}`;
            if (v.length === 11 && v.startsWith('010')) return `010-${v.slice(3, 7)}-${v.slice(7)}`;
            if (v.length === 10 && v.startsWith('02')) return `02-${v.slice(2, 6)}-${v.slice(6)}`;
            if (v.length === 10) return `${v.slice(0, 3)}-${v.slice(3, 6)}-${v.slice(6)}`;
            if (v.length === 8) return `${v.slice(0, 4)}-${v.slice(4)}`;
            return v;
        }

        function contractTagStyles(contractStatus) {
            const s = normalizeText(contractStatus);
            if (s.includes('계약완료') || s.includes('전달')) return { tagBg: 'bg-primary-container', tagText: 'text-on-primary', suspectText: 'text-primary-container' };
            if (s.includes('대기') || s.includes('타변')) return { tagBg: 'bg-secondary-container', tagText: 'text-on-secondary-container', suspectText: 'text-secondary' };
            if (s.includes('단순')) return { tagBg: 'bg-primary-container/20', tagText: 'text-on-primary-fixed', suspectText: 'text-on-primary-fixed-variant' };
            if (s.includes('보류') || s.includes('명도보류') || s.includes('가선보류')) return { tagBg: 'bg-tertiary-fixed', tagText: 'text-on-tertiary-fixed-variant', suspectText: 'text-on-tertiary-fixed-variant' };
            if (s.includes('불발') || s.includes('노답') || s.includes('노쇼') || s.includes('부재중') || s.includes('제외')) {
                return { tagBg: 'bg-error-container', tagText: 'text-on-error-container', suspectText: 'text-error' };
            }
            return { tagBg: 'bg-surface-container-low', tagText: 'text-on-surface-variant', suspectText: 'text-on-surface-variant' };
        }

        function normalizeRecord(rec, idx) {
            // DB 원본 날짜 텍스트 그대로 가져오기
            const rawDbDate = String(rec.dbEntryDate || rec['DB유입날짜'] || rec['DB 유입 날짜'] || rec.lastConsultLabel || rec.상담시간 || '').trim() || '-';
            const formattedPhone = formatPhone(rec.phone || rec.연락처 || rec.전화번호 || '');
            const rawName = String(rec.name || rec.이름 || '').trim();
            const displayName = rawName || formattedPhone || '-';
            
            return {
                id: rec.id || `r-${idx}`,
                name: displayName,
                phone: formattedPhone,
                suspect: rec.suspect || rec.혐의 || '',
                path: rec.path || rec.경로 || '',
                contractStatus: rec.contractStatus || rec.계약여부 || '대기',
                showCrmBadge: Boolean(rec.isNew === true || rec['신규등록'] === true || rec['CRM등록'] === true),
                firstCounselor: rec.firstCounselor || rec['1차상담자'] || rec['1차 상담자'] || '-',
                secondCounselor: rec.secondCounselor || rec['2차상담자'] || rec['2차 상담자'] || '-',
                firstGuideAmount: rec.firstGuideAmount || rec['1차안내금액'] || rec['안내 금액'] || '-',
                consultationContent: rec.consultationContent || rec.상담내용 || rec.문의사항 || '',
                consultationHistory: Array.isArray(rec.consultationHistory) ? rec.consultationHistory : [],
                dbEntryDateRaw: rawDbDate, // 원본 그대로 저장
                monthToken: extractMonthFromRaw(rawDbDate) // 필터용 월 숫자 추출
            };
        }

        function renderDetail(record) {
            if (!record) return;
            const detailTitle = document.getElementById('detail-title');
            if (detailTitle) detailTitle.textContent = `${record.name} 고객 상세`;

            const phoneWrap = document.getElementById('detail-phone');
            if (phoneWrap) {
                const telDigits = (record.phone || '').replace(/\D/g, '');
                phoneWrap.innerHTML = `
                    ${record.phone || '-'}
                    <a class="w-8 h-8 flex items-center justify-center rounded-lg bg-surface-container-high hover:bg-surface-variant text-primary-container transition-all" href="${telDigits ? `tel:${telDigits}` : '#'}">
                        <span class="material-symbols-outlined text-xl">call</span>
                    </a>
                `;
            }

            document.getElementById('detail-date').textContent = record.dbEntryDateRaw; // 1900년 버그 해결, 원본 출력
            document.getElementById('detail-counselor1').textContent = record.firstCounselor;
            document.getElementById('detail-counselor2').textContent = record.secondCounselor;
            document.getElementById('detail-price').textContent = record.firstGuideAmount;

            // 히스토리 렌더링
            const historyHost = document.getElementById('history-container');
            if (!historyHost) return;
            historyHost.innerHTML = '';
            const histories = record.consultationHistory || [];
            if (!histories.length) return; // 데이터 없으면 더미 싹 지우기

            const frag = document.createDocumentFragment();
            histories.forEach((h, idx) => {
                const dtLabel = String(h.date || h.datetime || h.createdAt || '').trim();
                const author = normalizeText(h.author || h.writer || h.counselor) || '담당자';
                const content = String(h.content || h.note || h.memo || '').trim();

                const wrap = document.createElement('div');
                wrap.className = 'relative';
                wrap.innerHTML = `
                    <div class="absolute -left-7 top-1 w-4 h-4 rounded-full ${idx === 0 ? 'bg-primary-container' : 'bg-surface-container-highest'} border-4 border-surface shadow-sm"></div>
                    <div class="bg-white p-5 rounded-xl shadow-sm border border-outline-variant/5 ${idx > 0 ? 'opacity-80' : ''}">
                        <div class="flex justify-between items-center mb-3">
                            <span class="text-xs font-bold text-on-primary-fixed-variant bg-surface-container px-2 py-1 rounded font-body">${dtLabel}</span>
                            <span class="text-xs font-medium text-outline font-body">작성자: ${author}</span>
                        </div>
                        <p class="text-sm text-on-surface leading-relaxed font-body">${content}</p>
                    </div>
                `;
                frag.appendChild(wrap);
            });
            historyHost.appendChild(frag);
        }

        function renderList(records) {
            const container = document.getElementById('prospect-list-container');
            if (!container) return;
            container.innerHTML = '';
            
            document.getElementById('badge-total-count').textContent = `전체 ${records.length}명`;

            if (!records.length) {
                container.innerHTML = '<div class="p-6 text-sm text-outline-variant font-body">조건에 맞는 데이터가 없습니다.</div>';
                return;
            }

            const frag = document.createDocumentFragment();
            records.forEach((record, idx) => {
                const styles = contractTagStyles(record.contractStatus);
                const isActive = idx === state.selectedIndex;
                const telDigits = (record.phone || '').replace(/\D/g, '');

                const item = document.createElement('div');
                // 클릭 효과 및 하단 구분선(border-b) 추가
                item.className = isActive
                    ? 'p-4 bg-surface-container-highest cursor-pointer border-l-4 border-primary-container border-b border-outline-variant/20 transition-all'
                    : 'p-4 hover:bg-surface-container-low cursor-pointer border-l-4 border-transparent border-b border-outline-variant/20 transition-all';
                item.dataset.index = String(idx);
                
                const crmBadgeHtml = record.showCrmBadge
                    ? '<span class="text-[10px] px-1.5 py-0.5 bg-[#4e56ab] text-white rounded font-bold mr-1">CRM등록</span>'
                    : '';

                item.innerHTML = `
                    <div class="flex justify-between items-center mb-1 px-2">
                        <span class="font-bold text-lg font-headline ${isActive ? '' : 'text-on-surface/80'}">${record.name}</span>
                        <div class="flex items-center">
                            ${crmBadgeHtml}
                            <span class="text-[11px] px-2 py-0.5 ${styles.tagBg} ${styles.tagText} rounded uppercase font-bold">${record.contractStatus || ''}</span>
                        </div>
                    </div>
                    <div class="flex justify-between items-center mb-1 px-2">
                        <div class="flex items-center gap-1.5">
                            <p class="text-sm text-on-surface-variant font-body">${record.phone || ''}</p>
                            <a class="w-5 h-5 flex items-center justify-center rounded-full ${isActive ? 'bg-white/50 hover:bg-white' : 'bg-surface-container-high hover:bg-surface-variant'} text-primary-container transition-colors" href="${telDigits ? `tel:${telDigits}` : '#'}">
                                <span class="material-symbols-outlined text-[14px]">call</span>
                            </a>
                        </div>
                        <p class="text-xs font-bold ${styles.suspectText} font-body">${record.suspect || ''}</p>
                    </div>
                    <div class="flex justify-between items-center px-2">
                        <span class="text-[10px] text-outline font-medium font-body">최근상담: ${record.dbEntryDateRaw}</span>
                        <span class="text-[10px] text-outline font-medium font-body">${record.path || ''}</span>
                    </div>
                `;
                frag.appendChild(item);
            });
            container.appendChild(frag);
        }

        function applyFilters() {
            const focusStatuses = new Set(['계약완료', '대기', '보류', '명도보류', '가선보류']);
            state.filteredRecords = state.allRecords.filter((r) => {
                const mOk = state.selectedMonth == null ? true : r.monthToken === state.selectedMonth;
                const crmOk = state.crmOnly ? r.showCrmBadge === true : true;
                const focusOk = state.focusOnly ? focusStatuses.has(r.contractStatus) : true;
                return mOk && crmOk && focusOk;
            });
            state.selectedIndex = 0;
            
            // 필터 버튼 시각적 스위치 변경
            const crmBtn = document.getElementById('filter-crm-btn');
            const focusBtn = document.getElementById('filter-focus-btn');
            const monthBtn = document.getElementById('filter-month-btn');

            if(crmBtn) {
                crmBtn.className = state.crmOnly 
                    ? 'px-4 py-1.5 bg-primary-container text-white text-sm font-bold rounded-full transition-all active:scale-95 font-headline'
                    : 'px-4 py-1.5 bg-surface-container-highest text-[#353e91] text-sm font-bold rounded-full transition-all active:scale-95 border border-primary-container/10 font-headline';
            }
            if(focusBtn) {
                focusBtn.className = state.focusOnly 
                    ? 'px-4 py-1.5 bg-primary-container text-white text-sm font-bold rounded-full transition-all active:scale-95 font-headline'
                    : 'px-4 py-1.5 bg-surface-container-highest text-[#353e91] text-sm font-bold rounded-full transition-all active:scale-95 border border-primary-container/10 font-headline';
            }
            if(monthBtn) {
                monthBtn.innerHTML = `${state.selectedMonth ? state.selectedMonth + '월' : '전체월'} <span class="material-symbols-outlined text-xs">keyboard_arrow_down</span>`;
            }
        }

        function bindListClickAfterRender() {
            const container = document.getElementById('prospect-list-container');
            if (!container) return;
            container.onclick = function (e) {
                const card = e.target.closest('[data-index]');
                if (!card) return;
                const idx = Number(card.dataset.index);
                if (Number.isNaN(idx)) return;
                state.selectedIndex = idx;
                renderList(state.filteredRecords);
                if(state.filteredRecords.length > 0) renderDetail(state.filteredRecords[state.selectedIndex]);
            };
        }

        function bindEvents() {
            document.getElementById('filter-month-btn')?.addEventListener('click', () => {
                if (state.selectedMonth == null) state.selectedMonth = 1;
                else state.selectedMonth = state.selectedMonth < 12 ? state.selectedMonth + 1 : null;
                applyFilters();
                renderList(state.filteredRecords);
                if(state.filteredRecords.length > 0) renderDetail(state.filteredRecords[state.selectedIndex]);
            });

            document.getElementById('filter-crm-btn')?.addEventListener('click', () => {
                state.crmOnly = !state.crmOnly;
                applyFilters();
                renderList(state.filteredRecords);
                if(state.filteredRecords.length > 0) renderDetail(state.filteredRecords[state.selectedIndex]);
            });

            document.getElementById('filter-focus-btn')?.addEventListener('click', () => {
                state.focusOnly = !state.focusOnly;
                applyFilters();
                renderList(state.filteredRecords);
                if(state.filteredRecords.length > 0) renderDetail(state.filteredRecords[state.selectedIndex]);
            });

            // 신규 고객 등록 로딩 지옥 방지 (낙관적 업데이트)
            const form = document.getElementById('new-customer-form');
            if(form) {
                form.addEventListener('submit', function(e) {
                    e.preventDefault(); // 새로고침 완벽 차단

                    const dateInput = document.getElementById('today-date').value;
                    // date picker 날짜를 MM/DD 형식 텍스트로 임시 변환
                    const d = new Date(dateInput);
                    const rawDateStr = `${d.getMonth()+1}/${d.getDate()}/웹등록`;

                    const newRec = normalizeRecord({
                        name: document.getElementById('new-name').value,
                        phone: document.getElementById('new-phone').value,
                        path: document.getElementById('new-path').value,
                        suspect: document.getElementById('new-suspect').value,
                        firstCounselor: document.getElementById('new-counselor').value,
                        contractStatus: document.getElementById('new-status').value,
                        isNew: true, // CRM 뱃지 발동
                        'DB유입날짜': rawDateStr
                    }, state.allRecords.length);

                    // 리스트 맨 위에 즉시 꽂아넣기
                    state.allRecords.unshift(newRec); 
                    
                    // 모달 닫기 및 리셋
                    document.getElementById('new-customer-modal').classList.add('hidden');
                    form.reset();
                    document.getElementById('today-date').value = new Date().toISOString().split('T')[0];

                    // 화면 즉시 재렌더링
                    state.crmOnly = false; // 필터 초기화해서 방금 등록한게 보이게 함
                    state.focusOnly = false;
                    applyFilters();
                    renderList(state.filteredRecords);
                    if(state.filteredRecords.length > 0) {
                        state.selectedIndex = 0;
                        renderDetail(state.filteredRecords[0]);
                    }
                });
            }
        }

        try {
            if (!GAS_WEBAPP_URL || GAS_WEBAPP_URL.includes('PUT_YOUR')) return;
            const url = `${GAS_WEBAPP_URL}?action=prospects&today=${encodeURIComponent(TODAY_FOR_FILTER)}`;
            const res = await fetch(url, { method: 'GET' });
            if (!res.ok) throw new Error(`GAS 응답 실패: ${res.status}`);

            const payload = await res.json();
            const rawRecords = Array.isArray(payload?.records) ? payload.records : [];
            state.allRecords = rawRecords.map(normalizeRecord);

            applyFilters();
            renderList(state.filteredRecords);
            if(state.filteredRecords.length > 0) renderDetail(state.filteredRecords[0]);
            
            bindListClickAfterRender(); 
            bindEvents();
            
        } catch (err) {
            console.error('[GAS Prospect Sync] failed:', err);
        }
    })();
</script>
<div class="fixed bottom-10 right-10 opacity-5 pointer-events-none select-none z-0">
<span class="material-symbols-outlined text-[300px]" style="font-variation-settings: 'FILL' 1;">shield</span>
</div>
</body></html>
